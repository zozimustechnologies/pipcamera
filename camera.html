<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PiP Camera</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="https://github.com/zozimustechnologies" class="github-btn" target="_blank" title="View on GitHub">&lt;&gt;</a>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <div class="header-icon"><img src="icons/icon-128.png" alt="PiP Camera" width="48" height="48"></div>
        <h1>PiP Camera</h1>
        <p class="subtitle">Picture-in-Picture Camera</p>
      </div>
      <a href="https://wise.com/pay/business/sandeepchadda?utm_source=open_link" class="donate-btn" target="_blank">Donate</a>
    </div>
    
    <div class="video-container">
      <video id="video" autoplay></video>
    </div>
    
    <div class="controls">
      <button id="startBtn">Start Camera</button>
      <button id="pipBtn" disabled>Enter PiP</button>
    </div>
    
    <div class="status">
      <p id="status">Click Start Camera to begin</p>
    </div>
  </div>
  
  <div class="footer">
    <p class="copyright">© 2026 <a href="https://github.com/zozimustechnologies" target="_blank" class="zozimus-link">Zozimus Technologies</a>. All rights reserved.</p>
  </div>

  <script src="camera.js"></script>
</body>
</html>
