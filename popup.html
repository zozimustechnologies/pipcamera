<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PiP Camera</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #3d7ea6 0%, #1a4a6e 100%);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    
    .container {
      background: white;
      border-radius: 14px;
      padding: 24px 22px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(26, 74, 110, 0.3);
    }
    
    .icon {
      margin-bottom: 10px;
      line-height: 0;
    }
    
    h1 {
      color: #2d3748;
      font-size: 20px;
      margin-bottom: 6px;
      font-weight: 700;
    }
    
    .subtitle {
      color: #718096;
      font-size: 13px;
      margin-bottom: 18px;
      line-height: 1.4;
    }
    
    button {
      width: 100%;
      padding: 12px 18px;
      background: linear-gradient(135deg, #3d7ea6 0%, #1a4a6e 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(61, 126, 166, 0.3);
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(61, 126, 166, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .footer {
      color: #a0aec0;
      font-size: 11px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><img src="icons/icon-128.png" alt="PiP Camera" width="44" height="44"></div>
    <h1>PiP Camera</h1>
    <p class="subtitle">Your rear-view camera for the workspace</p>
    <button id="pipBtn">Open Camera</button>
    <div class="footer">Click to open the camera page</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
